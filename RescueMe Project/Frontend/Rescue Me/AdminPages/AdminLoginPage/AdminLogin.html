<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول Admin- المنقذ للسيارات</title>
    <link rel="icon" type="image/png" href="/assets/logo (9).png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="AdminLogin.css">
</head>

<body>

    <div class="login-container">

        <!-- Right Side - Login Form -->
        <div class="right">
            <div class="form-box">

                <!-- Logo -->
                <div class="logo">
                    <img style="width: 32px; margin-left: 8px; margin-bottom: 8px;" src="/assets/logo (9).png"
                        alt="Logo">
                    <h2 style="color: #004471; display: inline;">المنقذ للسيارات</h2>
                </div>



                <!-- Email / Username Field -->
                <div class="input-group emailgroup">
                    <label class="input-label" for="emailInput">البريد الإلكتروني</label>
                    <input id="emailInput" class="emailinput" type="text" placeholder="example@mail.com">
                </div>

                <!-- Password Field -->
                <div class="input-group">
                    <div class="d-flex justify-content-between">
                        <label for="passwordInput">كلمة المرور</label>

                    </div>
                    <input id="passwordInput" class="passwordinput" type="password" placeholder="كلمة المرور">
                </div>
                <label style="color: #666;">
                    للدخول يرجى استخدام بيانات الأدمن
                </label>
                <!-- Login Button -->
                <button class="btn loginbtn">تسجيل الدخول</button>


            </div>
        </div>

        <div class="left">
            <h1>لوحة تحكم المسؤول</h1>

            <p>
                توفر لوحة التحكم رؤية شاملة لجميع عمليات منصة المنقذ، مما يساعد
                على إدارة الطلبات ومراقبة جودة الخدمة وتحسين تجربة المستخدم.
            </p>

            <div class="features">

                <div class="feature-card">
                    <img src="/assets/logo1.png" alt="">
                    <h6>متابعة الطلبات</h6>
                    <p>مراجعة تفاصيل الطلبات وحالتها وتقييمات العملاء</p>
                </div>

                <div class="feature-card">
                    <img src="/assets/logo2.png" alt="">
                    <h6>إدارة المنصة</h6>
                    <p>الإشراف على مقدمي الخدمات ومراقبة أداء النظام</p>
                </div>

            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="AdminLogin.js"></script>
</body>

</html>
